name: QA Agent Review

on:
  pull_request:
    paths:
      - "local-workspace/.claude/skills/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > /tmp/pr_diff.txt

      - name: Run QA Agent review
        id: qa
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path

          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["OPENROUTER_API_KEY"],
              base_url="https://openrouter.ai/api/v1",
          )

          system_prompt = Path("remote-gateway/prompts/qa_agent_instructions.md").read_text()
          diff = Path("/tmp/pr_diff.txt").read_text()

          response = client.chat.completions.create(
              model="anthropic/claude-opus-4-6",
              messages=[
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"Review the following PR diff:\n\n```diff\n{diff}\n```"},
              ],
          )

          review = response.choices[0].message.content

          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "a") as f:
              delimiter = "EOREVIEW"
              f.write(f"review<<{delimiter}\n{review}\n{delimiter}\n")
          PYEOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.QA_REVIEW;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Automated QA Agent Review\n\n${review}`
            });
        env:
          QA_REVIEW: ${{ steps.qa.outputs.review }}
